version: "3.9"

services:
  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    volumes:
      - ../../artifacts:/app/artifacts

  dashboard:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.dashboard
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - ../../artifacts:/app/artifacts

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
